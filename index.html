      // 404.html이 /?/원래/경로 형태로 인코딩해 보낸 URL을, React가 마운트되기 전에
      // history.replaceState로 정상 경로로 되돌린다. (로컬/실서비스에서는 매칭되지 않아 no-op)
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&')
          }).join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
