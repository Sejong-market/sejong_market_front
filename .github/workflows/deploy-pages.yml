name: Deploy development to GitHub Pages

# development 브랜치에 push가 발생할 때마다 자동 빌드 후
# gh-pages 브랜치로 산출물을 push 한다. (gh-pages 브랜치는 CI 전용)
# 수동 실행(workflow_dispatch)도 가능.
on:
  push:
    branches: [development]
  workflow_dispatch:

# GITHUB_TOKEN이 gh-pages 브랜치에 push 할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

# 같은 브랜치에서 연속 push 시 이전 실행은 취소하여 비용·시간 절약
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages base path)
        env:
          DEPLOY_TARGET: gh-pages
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          # 새로고침/딥링크용 SPA 폴백을 보장하기 위해 404.html은 dist에 함께 포함됨
          # (public/404.html 이 Vite 빌드 시 자동으로 복사됨)
          commit_message: 'chore(pages): deploy ${{ github.sha }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
